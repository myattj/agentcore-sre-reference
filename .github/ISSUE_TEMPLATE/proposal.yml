name: Product improvement proposal
description: Propose a larger change to the self-hosted product
title: "[Proposal]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Agent is a self-hosted open-source product, not a hosted service. A proposal should make installation, tenant safety, integrations, operation, or developer experience materially better.
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Who benefits, what are they trying to learn or reuse, and why is the current repository insufficient?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: Describe the smallest complete change and the components it would affect.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security and operational boundaries
      description: Cover tenant isolation, authentication, IAM, data retention, external services, cloud cost, and migration impact where relevant.
    validations:
      required: true
  - type: textarea
    id: product_fit
    attributes:
      label: Why this belongs in the shared product
      description: Explain why this should land upstream instead of remaining specific to one operator's fork or AWS environment.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: List the tests, synthetic scenarios, and documentation updates that would prove the change works.
    validations:
      required: true
